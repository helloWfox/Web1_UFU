<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 01 — Posicionamento Absoluto em Cascata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<body>
  <header class="cabecalho">
    <h1>Posicionamento Absoluto em Cascata</h1>
    <p>Três elementos sobrepostos com coordenadas distintas de topo e esquerda (efeito cascata).</p>
  </header>

  <main class="recipiente-absoluto">
    <div class="caixa caixa-vermelha" id="caixa1">
      <span>Caixa 1</span>
    </div>
    <div class="caixa caixa-verde" id="caixa2">
      <span>Caixa 2</span>
    </div>
    <div class="caixa caixa-azul" id="caixa3">
      <span>Caixa 3</span>
    </div>
  </main>
</body>
