<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exercício 08 — Agenda com rowspan</title>
  <style>
    table { border-collapse: collapse; }
    th, td { border: 1px solid #333; padding: 8px 14px; }
  </style>
</head>
<body>
  <table>
    <tr>
      <th>Horário</th>
      <th>Atividade</th>
    </tr>
    <tr>
      <td>08:00 - 10:00</td>
      <td rowspan="2">Reunião</td>
    </tr>
    <tr>
      <td>10:00 - 12:00</td>
    </tr>
    <tr>
      <td>13:00 - 14:00</td>
      <td>Almoço</td>
    </tr>
  </table>
</body>
</html>
