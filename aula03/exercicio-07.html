<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exercício 07 — Tabela de produtos</title>
  <style>
    table { border-collapse: collapse; }
    th, td { border: 1px solid #333; padding: 8px 12px; }
    th { background: #edf2f7; }
  </style>
</head>
<body>
  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Quantidade</th>
        <th>Preço Unitário</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Produto 1</td>
        <td>2</td>
        <td>R$ 50,00</td>
        <td>R$ 100,00</td>
      </tr>
      <tr>
        <td>Produto 2</td>
        <td>1</td>
        <td>R$ 150,00</td>
        <td>R$ 150,00</td>
      </tr>
      <tr>
        <td colspan="3"><strong>Total Geral</strong></td>
        <td>R$ 250,00</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
