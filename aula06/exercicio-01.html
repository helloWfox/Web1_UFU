<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exercício 01 — Flexbox com wrap</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      border: 5px solid black;
      padding: 20px;
      min-height: 300px;
    }

    .produto {
      width: 150px;
      height: 180px;
      background-color: blueviolet;
      color: white;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 10px;
      border-radius: 4px;
      font-size: 14px;
    }

    .produto img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="produto">
      <img src="https://placehold.co/120x120/fff/blueviolet?text=P1" alt="Produto 1">
      Produto 1
    </div>
    <div class="produto">
      <img src="https://placehold.co/120x120/fff/blueviolet?text=P2" alt="Produto 2">
      Produto 2
    </div>
    <div class="produto">
      <img src="https://placehold.co/120x120/fff/blueviolet?text=P3" alt="Produto 3">
      Produto 3
    </div>
    <div class="produto">
      <img src="https://placehold.co/120x120/fff/blueviolet?text=P4" alt="Produto 4">
      Produto 4
    </div>
    <div class="produto">
      <img src="https://placehold.co/120x120/fff/blueviolet?text=P5" alt="Produto 5">
      Produto 5
    </div>
    <div class="produto">
      <img src="https://placehold.co/120x120/fff/blueviolet?text=P6" alt="Produto 6">
      Produto 6
    </div>
  </div>
</body>
</html>
