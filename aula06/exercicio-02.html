<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Exercício 02 — CSS Grid</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
    }

    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 10px;
      height: 450px;
      grid-template-areas:
        "item-1 item-2 item-2 item-2 item-3"
        "item-1 item-5 item-6 item-7 item-3"
        "item-4 item-8 item-8 item-8 item-3";
    }

    .item {
      background-color: blue;
      color: white;
      font-weight: bold;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 8px;
      font-size: 14px;
    }

    .item-1 { grid-area: item-1; }
    .item-2 { grid-area: item-2; }
    .item-3 { grid-area: item-3; }
    .item-4 { grid-area: item-4; }
    .item-5 { grid-area: item-5; }
    .item-6 { grid-area: item-6; }
    .item-7 { grid-area: item-7; }
    .item-8 { grid-area: item-8; }
  </style>
</head>
<body>
  <div class="grid-container">
    <div class="item item-1">Item 1</div>
    <div class="item item-2">Item 2</div>
    <div class="item item-3">Item 3</div>
    <div class="item item-4">Item 4</div>
    <div class="item item-5">Item 5</div>
    <div class="item item-6">Item 6</div>
    <div class="item item-7">Item 7</div>
    <div class="item item-8">Item 8</div>
  </div>
</body>
</html>
